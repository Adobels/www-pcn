<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Association Polonia Caen Normandie</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #ffffff;
      --text: #073169;
      --accent: #e31831;
      --muted: #1b72b4;
      --gold: #e6cea6;
      --box-border: 1px solid #e6cea6;
      font-family: "Inter", "Segoe UI", system-ui, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 2.5rem 1.5rem 1.5rem;
      text-align: center;
    }

    header img {
      max-width: 220px;
      width: 100%;
      height: auto;
      border-radius: 1rem;
    }

    main {
      flex: 1;
      padding: 0 1.5rem 3rem;
      display: grid;
      gap: 2rem;
    }

    section {
      background: #fff;
      border-radius: 1.25rem;
      padding: 2rem;
      box-shadow: 0 15px 40px rgba(15, 23, 42, 0.12);
      border: var(--box-border);
    }

    h1 {
      margin: 1.5rem 0 0.5rem;
      font-size: clamp(2rem, 4vw, 3rem);
      line-height: 1.1;
    }

    h2 {
      margin-top: 0;
      font-size: 1.5rem;
    }

    p {
      margin: 0 0 1rem;
      line-height: 1.6;
    }

    ul {
      padding-left: 1.25rem;
      margin: 0 0 1.5rem;
      line-height: 1.6;
    }

    .intro {
      text-align: center;
      background: transparent;
      border: var(--box-border);
      color: var(--text);
      position: relative;
      overflow: hidden;
    }

    .intro::after {
      content: "";
      position: absolute;
      inset: 0;
      background: transparent;
    }

    .intro > * {
      position: relative;
      z-index: 1;
    }

    .cta {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.85rem 1.75rem;
      border-radius: 999px;
      background: #073169;
      color: #fff;
      font-weight: 600;
      text-decoration: none;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 10px 30px rgba(7, 49, 105, 0.35);
      margin: 0.25rem;
    }

    .cta:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 35px rgba(7, 49, 105, 0.45);
    }

    .cta.alt {
      background: #e6cea6;
      color: #073169;
      box-shadow: 0 10px 30px rgba(230, 206, 166, 0.45);
    }


    .grid {
      display: grid;
      gap: 1.5rem;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      align-items: start;
    }

    .card {
      border: var(--box-border);
      border-radius: 1rem;
      padding: 1.5rem;
    }

    .team-pane {
      display: grid;
      gap: 1.5rem;
      align-items: center;
    }

    .team-pane img {
      width: 100%;
      border-radius: 1rem;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.2);
    }

    .team-caption {
      margin-top: 0.75rem;
      color: var(--text);
      font-style: italic;
    }
    .contact-address {
      text-align: center;
      line-height: 1.5;
    }
    .social-links {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 1rem;
    }
    .social-links a {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      color: var(--text);
      text-decoration: none;
      border: 1px solid var(--muted);
      padding: 0.5rem 1rem;
      border-radius: 999px;
      font-weight: 600;
    }

    footer {
      text-align: center;
      padding: 2rem 1rem;
      color: var(--text);
    }

    @media (min-width: 900px) {
      main {
        padding: 0 4rem 4rem;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      main section:first-child,
      .about,
      .mission,
      .team-pane,
      .contact {
        grid-column: 1 / -1;
      }
    }
  </style>
</head>
<body>
  <header>
    <img src="images/pcn_logo_horizontal.png" alt="Association Polonia Caen Normandie" />
    <h1>Association Polonia Caen Normandie</h1>
    <p>À Caen, au service du Calvados et de toute la Normandie.</p>
  </header>

  <main>
    <section class="intro" data-include="sections/intro.html"></section>

    <section class="about" data-include="sections/about.html"></section>

    <section class="card mission" data-include="sections/mission.html"></section>

    <section class="team-pane" data-include="sections/team.html"></section>

    <section class="card contact" data-include="sections/contact.html"></section>
  </main>

  <footer>
    © 2026 Association Polonia Caen Normandie · Polonia · Caen · Calvados · Normandie
  </footer>

  <script>
    document.querySelectorAll("[data-include]").forEach(async (section) => {
      const url = section.getAttribute("data-include");
      try {
        const response = await fetch(url);
        section.innerHTML = await response.text();
      } catch (error) {
        console.error("Erreur de chargement pour", url, error);
      }
    });
  </script>
</body>
</html>
